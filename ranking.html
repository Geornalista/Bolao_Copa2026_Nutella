<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - Bolão da Copa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .podium-1 { height: 160px; }
        .podium-2 { height: 120px; }
        .podium-3 { height: 90px; }
    </style>
</head>
<body class="bg-slate-100 font-sans relative text-slate-800 antialiased min-h-screen pb-12">

    <!-- Cabeçalho -->
    <div class="bg-blue-800 text-white py-8 px-4 shadow-xl mb-10 rounded-b-3xl">
        <div class="max-w-4xl mx-auto flex flex-col items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-400"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            <h1 class="text-3xl font-extrabold tracking-tight uppercase">Classificação Geral</h1>
            <p class="text-blue-200 font-medium text-sm mt-1">Ranking atualizado em tempo real</p>
        </div>
    </div>

    <div class="max-w-3xl mx-auto px-4">
        
        <!-- Carregamento -->
        <div id="loading-state" class="flex flex-col items-center justify-center py-20">
            <svg class="animate-spin h-10 w-10 text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <p class="text-slate-500 font-bold text-lg animate-pulse">A carregar o ranking...</p>
        </div>

        <!-- Erro -->
        <div id="error-state" class="hidden bg-red-50 text-red-700 p-6 rounded-2xl flex flex-col items-center text-center border border-red-200 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <h3 class="font-bold text-lg">Erro ao carregar dados</h3>
            <p id="error-message" class="text-sm mt-1 mb-4">Não foi possível ligar à folha de cálculo.</p>
            <button onclick="fetchRanking()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition">Tentar Novamente</button>
        </div>

        <!-- Conteúdo do Ranking -->
        <div id="ranking-content" class="hidden opacity-0 animate-fade-in">
            
            <!-- Pódio (Top 3) -->
            <div id="podium" class="flex items-end justify-center gap-2 sm:gap-4 mb-12 mt-8">
                <!-- Preenchido via JS -->
            </div>

            <!-- Tabela dos Restantes (4º em diante) -->
            <div class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                <div class="bg-slate-800 px-6 py-4 flex justify-between text-white font-bold text-sm uppercase tracking-wider">
                    <span class="w-16">Pos</span>
                    <span class="flex-1">Participante</span>
                    <span class="w-20 text-right">Pontos</span>
                </div>
                <div id="ranking-list" class="divide-y divide-slate-100">
                    <!-- Preenchido via JS -->
                </div>
            </div>

            <!-- Botão Atualizar -->
            <div class="mt-8 text-center">
                <button onclick="fetchRanking()" class="inline-flex items-center gap-2 bg-white text-blue-700 font-bold py-3 px-6 rounded-xl shadow border border-slate-200 hover:bg-slate-50 transition active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                    Atualizar Ranking
                </button>
            </div>
        </div>

    </div>

    <script>
        // =====================================================================
        // ATENÇÃO: COLE AQUI A SUA NOVA URL GERADA NO APPS SCRIPT
        // =====================================================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHDD_Rq3w5yHOL3d4Pc1hCutUg16-JUaWvQ6jd3FCKxv4s3iML4l67Jd_dNogn3iDi/exec';

        document.addEventListener('DOMContentLoaded', fetchRanking);

        async function fetchRanking() {
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('error-state').classList.add('hidden');
            document.getElementById('ranking-content').classList.add('hidden');

            try {
                // Ao contrário do doPost (gravação), o doGet (leitura) permite uma chamada padrão sem "no-cors"
                const response = await fetch(SCRIPT_URL);
                const json = await response.json();

                if (json.result === 'success') {
                    renderData(json.data);
                } else {
                    showError(json.message);
                }
            } catch (error) {
                console.error("Erro na ligação:", error);
                // Se ainda for a string padrão de espaço reservado, mostramos um aviso claro
                if (SCRIPT_URL === 'COLE_AQUI_A_NOVA_URL') {
                    showError("Falta colar a URL do Google Apps Script no código HTML (linha 78).");
                } else {
                    showError("Falha na ligação. Verifique se o link do Apps Script está correto e implantado como 'Qualquer Pessoa'.");
                }
            }
        }

        function showError(msg) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-message').textContent = msg;
        }

        function renderData(data) {
            // Ordenar do maior para o menor garantidamente
            data.sort((a, b) => b.score - a.score);

            const podiumContainer = document.getElementById('podium');
            const listContainer = document.getElementById('ranking-list');
            podiumContainer.innerHTML = '';
            listContainer.innerHTML = '';

            if (data.length === 0) {
                listContainer.innerHTML = '<div class="p-8 text-center text-slate-500 font-medium">Nenhum participante encontrado na aba CLASSIFICAÇÃO.</div>';
            }

            // Construir o Pódio (Top 3)
            if (data.length >= 1) {
                let p2 = data[1] ? buildPodiumPlace(data[1].name, data[1].score, 2, 'bg-slate-300', 'text-slate-600', 'podium-2') : '<div class="w-24 sm:w-32"></div>';
                let p1 = data[0] ? buildPodiumPlace(data[0].name, data[0].score, 1, 'bg-yellow-400', 'text-yellow-800', 'podium-1') : '<div class="w-24 sm:w-32"></div>';
                let p3 = data[2] ? buildPodiumPlace(data[2].name, data[2].score, 3, 'bg-amber-600', 'text-white', 'podium-3') : '<div class="w-24 sm:w-32"></div>';
                
                podiumContainer.innerHTML = p2 + p1 + p3;
            }

            // Construir a Tabela (4º em diante)
            let listHtml = '';
            for (let i = 3; i < data.length; i++) {
                listHtml += `
                    <div class="flex items-center px-6 py-4 hover:bg-slate-50 transition">
                        <div class="w-16 font-black text-slate-400 text-lg">#${i + 1}</div>
                        <div class="flex-1 font-bold text-slate-700 truncate pr-4">${data[i].name}</div>
                        <div class="w-20 text-right font-black text-blue-600 text-xl">${data[i].score}</div>
                    </div>
                `;
            }
            listContainer.innerHTML = listHtml;

            // Mostrar
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('ranking-content').classList.remove('hidden');
        }

        function buildPodiumPlace(name, score, position, colorClass, textColorClass, heightClass) {
            let emoji = position === 1 ? '🥇' : position === 2 ? '🥈' : '🥉';
            return `
                <div class="flex flex-col items-center w-24 sm:w-32 relative">
                    <div class="font-bold text-slate-700 text-center text-sm sm:text-base truncate w-full mb-1">${name}</div>
                    <div class="font-black text-blue-700 text-lg mb-2">${score} pts</div>
                    <div class="${colorClass} w-full rounded-t-xl ${heightClass} flex flex-col justify-start pt-4 shadow-lg border-x border-t border-black/5 relative overflow-hidden">
                        <div class="absolute inset-0 bg-white/20"></div>
                        <span class="text-3xl sm:text-4xl relative z-10 text-center drop-shadow-md">${emoji}</span>
                        <span class="${textColorClass} font-black text-xl sm:text-3xl relative z-10 mt-auto pb-4 text-center">#${position}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
